name: Java Matrix strategy

on:
    push:
      branches: [ "master", "main" ]
    pull_request:
      branches: [ "master", "main" ]
jobs:
  build:
    # Cấu hình Matrix Strategy
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }} # Chạy trên từng hệ điều hành trong danh sách

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Build with Maven
        run: mvn clean package